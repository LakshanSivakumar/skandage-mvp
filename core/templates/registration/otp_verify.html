<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Login - Skandage</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border border-slate-200">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">Two-Factor Auth</h1>
            <p class="text-slate-500 text-sm mt-1">We sent a 6-digit code to <strong>{{ masked_email }}</strong>.</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if messages %}
                {% for message in messages %}
                    <div class="bg-red-50 text-red-600 p-3 rounded text-sm text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Authentication Code</label>
                <input type="text" name="otp" maxlength="6" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none text-center text-xl tracking-widest font-mono" required placeholder="000000">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded transition">
                Verify & Login
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-slate-400">
            <a href="{% url 'login' %}" class="hover:text-blue-500 hover:underline">Cancel and return to login</a>
        </div>
    </div>

</body>
</html>
