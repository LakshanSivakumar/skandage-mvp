<!DOCTYPE html>
<html lang="en">
<head>
    <title>Check Inbox - Skandage</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border border-slate-200 text-center">
        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
            📧
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Check your inbox</h1>
        <p class="text-slate-500 text-sm leading-relaxed mb-6">
            We've emailed you instructions for setting your password. You should receive them shortly.
        </p>
        <a href="{% url 'login' %}" class="w-full block bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 rounded transition">
            Return to Login
        </a>
    </div>
</body>
</html>
