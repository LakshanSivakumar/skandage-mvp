<!DOCTYPE html>
<html lang="en">
<head>
    <title>Password Updated - Skandage</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border border-slate-200 text-center">
        <div class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
            ✓
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Password Updated</h1>
        <p class="text-slate-500 text-sm leading-relaxed mb-6">
            Your password has been successfully reset. You can now log in with your new credentials.
        </p>
        <a href="{% url 'login' %}" class="w-full block bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded transition">
            Log In Now
        </a>
    </div>
</body>
</html>
