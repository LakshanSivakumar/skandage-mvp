<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Skandage</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border border-slate-200">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">Reset Password</h1>
            <p class="text-slate-500 text-sm mt-2">Enter your email address and we'll send you a secure link to reset your password.</p>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Email Address</label>
                <input type="email" name="email" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded transition">
                Send Reset Link
            </button>
        </form>
        <div class="mt-6 text-center">
            <a href="{% url 'login' %}" class="text-sm text-slate-500 hover:text-slate-800 font-medium">&larr; Back to login</a>
        </div>
    </div>
</body>
</html>
